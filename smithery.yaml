# Smithery configuration for PicPay MCP
# Schema: https://smithery.ai/docs/build/project-config
# Remote HTTP MCP — server hosted at https://api.mcp.ai/p_picpay

name: picpay-mcp
displayName: "PicPay MCP"
description: >
  Conecte sua conta do **PicPay** ao Claude, ChatGPT e agentes de IA via Open Finance Brasil. Pergunte sobre saldos, extratos, faturas de cartão e investimentos do PicPay em linguagem natural. Regulado pelo Banco Central, somente leitura.

version: 0.1.0
license: MIT
homepage: https://github.com/mcp-dir/picpay-mcp
repository: https://github.com/mcp-dir/picpay-mcp

tags:
  - picpay
  - open-finance
  - open-banking
  - banking
  - brazil
  - finance
  - fintech
  - read-only

# Remote HTTP MCP — sem startCommand local (servidor já hospedado)
startCommand:
  type: http
  url: https://api.mcp.ai/p_picpay

auth:
  type: oauth2
  resourceMetadataUrl: https://api.mcp.ai/p_picpay/.well-known/oauth-protected-resource
  fallback:
    type: agent-auth
    description: >
      Para clientes sem OAuth 2.1. O agente expõe uma tool authenticate(token).
      Usuário gera o JWT em https://app.mcp.ai/agent-auth e cola no chat.
